<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Code4Earth</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #0d5c63;
  --primary-dark: #09474d;
  --primary-light: #12878f;
  --secondary: #0a4e29;
  --accent: #27ae60;
  --light: #f8f9fa;
  --dark: #343a40;
  --gray: #6c757d;
  --light-gray: #e9ecef;
  --border-radius: 10px;
  --transition: all 0.3s ease;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #cfdbed, #e6f3ec);
  font-family: 'Poppins', sans-serif;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

/* Background decoration */
body::before {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(13, 92, 99, 0.1) 0%, rgba(13, 92, 99, 0) 70%);
  top: -100px;
  right: -100px;
  z-index: 0;
}

body::after {
  content: "";
  position: absolute;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(10, 78, 41, 0.1) 0%, rgba(10, 78, 41, 0) 70%);
  bottom: -50px;
  left: -50px;
  z-index: 0;
}

.signup-container {
  background: #5dd161;
  padding: 18px 15px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  width: 100%;
  max-width: 340px;
  text-align: center;
  animation: fadeIn 1s ease;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  position: relative;
  z-index: 1;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.signup-container:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 30px rgba(0,0,0,0.15);
}

.signup-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 10px;
  gap: 8px;
}

.signup-logo-icon {
  width: 28px;
  height: 28px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 16px;
}

.signup-brand {
  font-size: 16px;
  font-weight: 700;
  color: var(--secondary);
  letter-spacing: -0.5px;
}

.signup-container h2,
.signup-heading {
  margin-bottom: 10px;
  color: var(--secondary);
  font-size: 18px;
  font-weight: 600;
}

.signup-form-group {
  margin-bottom: 8px;
  text-align: left;
  position: relative;
}

.signup-form-group label {
  font-size: 10px;
  font-weight: 500;
  color: var(--dark);
  display: block;
  margin-bottom: 3px;
}

.signup-input-wrapper {
  position: relative;
}

.signup-form-group input {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid #ccc;
  border-radius: var(--border-radius);
  outline: none;
  font-size: 11px;
  transition: var(--transition);
  font-family: 'Poppins', sans-serif;
  background-color: var(--light);
}

.signup-form-group input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(13, 92, 99, 0.2);
  background-color: white;
}

.signup-form-group input.error {
  border-color: #e74c3c;
}

.signup-error-message {
  color: #e74c3c;
  font-size: 9px;
  margin-top: 2px;
  display: none;
}

.signup-toggle-password {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gray);
  cursor: pointer;
  transition: var(--transition);
  font-size: 11px;
}

.signup-toggle-password:hover {
  color: var(--primary);
}

.signup-form-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  font-size: 10px;
}

.signup-terms {
  display: flex;
  align-items: flex-start;
  gap: 4px;
  color: var(--dark);
}

.signup-terms input {
  width: auto;
  margin: 0;
  margin-top: 2px;
}

.signup-btn {
  width: 100%;
  padding: 9px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff;
  border: none;
  border-radius: var(--border-radius);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Poppins', sans-serif;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
  margin-bottom: 8px;
}

.signup-btn:hover {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(13, 92, 99, 0.3);
}

.signup-btn:active {
  transform: translateY(0);
}

.signup-btn:disabled {
  opacity: 0.7;
  cursor: not-allowed;
  transform: none;
}

.signup-spinner {
  display: none;
  margin-left: 5px;
}

.signup-btn.loading .signup-spinner {
  display: inline-block;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.signup-divider {
  display: flex;
  align-items: center;
  margin: 8px 0;
  color: var(--gray);
  font-size: 10px;
}

.signup-divider::before,
.signup-divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--light-gray);
}

.signup-divider span {
  padding: 0 8px;
}

.signup-social-login {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}

.signup-social-btn {
  flex: 1;
  padding: 12px;
  border: 1px solid var(--light-gray);
  border-radius: var(--border-radius);
  background: white;
  color: var(--dark);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.signup-social-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.signup-social-btn i {
  font-size: 16px;
}

.signup-google { color: #355fea; }
.signup-github { color: #333; }
.signup-twitter { color: #1da1f2; }

.signup-extra {
  margin-top: 8px;
  font-size: 11px;
  color: var(--dark);
}

.signup-extra a {
  color: var(--primary);
  font-weight: 600;
  text-decoration: none;
  transition: var(--transition);
}

.signup-extra a:hover {
  color: var(--primary-light);
  text-decoration: underline;
}

.signup-notification {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 12px 16px;
  border-radius: var(--border-radius);
  background: white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  display: flex;
  align-items: center;
  gap: 8px;
  transform: translateX(120%);
  transition: transform 0.3s ease;
  z-index: 1000;
}

.signup-notification.show {
  transform: translateX(0);
}

.signup-notification.success {
  border-left: 4px solid var(--accent);
}

.signup-notification.error {
  border-left: 4px solid #e74c3c;
}

.signup-notification i {
  font-size: 16px;
}

.signup-notification.success i {
  color: var(--accent);
}

.signup-notification.error i {
  color: #e74c3c;
}

.signup-notification-content {
  flex: 1;
}

.signup-notification-title {
  font-weight: 600;
  margin-bottom: 2px;
  font-size: 13px;
}

.signup-notification-message {
  font-size: 11px;
  color: var(--gray);
}

.signup-notification-close {
  cursor: pointer;
  color: var(--gray);
  transition: var(--transition);
  font-size: 12px;
}

.signup-notification-close:hover {
  color: var(--dark);
}

footer {
  position: absolute;
  bottom: 10px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 10px;
  color: var(--gray);
  z-index: 1;
}

footer a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 500;
  transition: var(--transition);
}

footer a:hover {
  text-decoration: underline;
}

@media (max-width: 480px) {
  .signup-container { 
    padding: 15px 12px; 
    max-width: 100%;
  }
  
  .signup-logo {
    margin-bottom: 8px;
  }
  
  .signup-container h2,
  .signup-heading { font-size: 16px; }
  
  .signup-btn { 
    font-size: 11px; 
    padding: 8px;
  }
  
  .signup-social-login {
    flex-direction: column;
    gap: 6px;
  }
  
  .signup-social-btn {
    padding: 10px;
  }
  
  .signup-notification {
    right: 10px;
    left: 10px;
  }
}
</style>
</head>
<body>
  <div class="signup-container">
  <div class="signup-logo">
    <div class="signup-logo-icon">
      <i class="fas fa-code-branch"></i>
    </div>
    <div class="signup-brand">Code4Earth</div>
  </div>
  
  <h2 class="signup-heading">Create Your Account</h2>
  
  <form id="signupForm">
    <div class="signup-form-group">
      <label for="fullName">Full Name</label>
      <div class="signup-input-wrapper">
        <input type="text" id="fullName" placeholder="Enter your name" required>
        <span class="signup-error-message">Please enter your full name</span>
      </div>
    </div>
    
    <div class="signup-form-group">
      <label for="email">Email Address</label>
      <div class="signup-input-wrapper">
        <input type="email" id="email" placeholder="Enter your email" required>
        <span class="signup-error-message">Please enter a valid email address</span>
      </div>
    </div>
    
    <div class="signup-form-group">
      <label for="mobile">Mobile Number</label>
      <div class="signup-input-wrapper">
        <input type="tel" id="mobile" placeholder="Enter your number" required>
        <span class="signup-error-message">Please enter a valid mobile number</span>
      </div>
    </div>
    
    <div class="signup-form-group">
      <label for="password">Password</label>
      <div class="signup-input-wrapper">
        <input type="password" id="password" placeholder="Create a password" required>
        <i class="fas fa-eye signup-toggle-password" id="togglePassword"></i>
        <span class="signup-error-message">Password must be at least 8 characters</span>
      </div>
    </div>
    
    <div class="signup-form-group">
      <label for="confirmPassword">Confirm Password</label>
      <div class="signup-input-wrapper">
        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
        <i class="fas fa-eye signup-toggle-password" id="toggleConfirmPassword"></i>
        <span class="signup-error-message">Passwords do not match</span>
      </div>
    </div>
    
    <div class="signup-form-options">
      <div class="signup-terms">
        <input type="checkbox" id="terms">
        <label for="terms">I agree to the Terms and Conditions</label>
      </div>
    </div>
    
    <button type="submit" class="signup-btn" id="signupBtn">
      Sign Up
      <i class="fas fa-spinner signup-spinner"></i>
    </button>
  </form>
  
  <div class="signup-divider">
    <span>or continue with</span>
  </div>
  
  <div class="signup-social-login">
    <button class="signup-social-btn signup-google">
      <i class="fab fa-google"></i> Google
    </button>
    <button class="signup-social-btn signup-github">
      <i class="fab fa-github"></i> GitHub
    </button>
    <button class="signup-social-btn signup-twitter">
      <i class="fab fa-twitter"></i> Twitter
    </button>
  </div>
  
  <div class="signup-extra">
    Already have an account? <a href="login.html">Login here</a>
  </div>
</div>

<!-- Notification -->
<div class="signup-notification" id="notification">
  <i class="fas fa-check-circle"></i>
  <div class="signup-notification-content">
    <div class="signup-notification-title">Success</div>
    <div class="signup-notification-message">Your account has been created successfully!</div>
  </div>
  <i class="fas fa-times signup-notification-close" id="notificationClose"></i>
</div>

  
  <script>
    // Toggle password visibility
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    
    togglePassword.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.classList.toggle('fa-eye');
      this.classList.toggle('fa-eye-slash');
    });
    
    toggleConfirmPassword.addEventListener('click', function() {
      const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      confirmPasswordInput.setAttribute('type', type);
      this.classList.toggle('fa-eye');
      this.classList.toggle('fa-eye-slash');
    });
    
    // Form validation and submission
    const signupForm = document.getElementById('signupForm');
    const fullNameInput = document.getElementById('fullName');
    const emailInput = document.getElementById('email');
    const mobileInput = document.getElementById('mobile');
    const termsCheckbox = document.getElementById('terms');
    const signupBtn = document.getElementById('signupBtn');
    const notification = document.getElementById('notification');
    const notificationClose = document.getElementById('notificationClose');
    
    // Show notification function
    function showNotification(type, title, message) {
      const notificationEl = document.getElementById('notification');
      const icon = notificationEl.querySelector('i');
      const titleEl = notificationEl.querySelector('.notification-title');
      const messageEl = notificationEl.querySelector('.notification-message');
      
      // Set notification type
      notificationEl.className = 'notification ' + type;
      
      // Set icon based on type
      if (type === 'success') {
        icon.className = 'fas fa-check-circle';
      } else if (type === 'error') {
        icon.className = 'fas fa-exclamation-circle';
      }
      
      // Set content
      titleEl.textContent = title;
      messageEl.textContent = message;
      
      // Show notification
      notificationEl.classList.add('show');
      
      // Auto hide after 5 seconds
      setTimeout(() => {
        notificationEl.classList.remove('show');
      }, 5000);
    }
    
    // Close notification
    notificationClose.addEventListener('click', function() {
      notification.classList.remove('show');
    });
    
    // Form submission
    signupForm.addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Reset previous errors
      document.querySelectorAll('.error-message').forEach(el => {
        el.style.display = 'none';
      });
      document.querySelectorAll('.form-group input').forEach(input => {
        input.classList.remove('error');
      });
      
      // Basic validation
      let isValid = true;
      
      // Full name validation
      if (fullNameInput.value.trim().length < 2) {
        fullNameInput.classList.add('error');
        fullNameInput.nextElementSibling.style.display = 'block';
        isValid = false;
      }
      
      // Email validation
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(emailInput.value)) {
        emailInput.classList.add('error');
        emailInput.nextElementSibling.style.display = 'block';
        isValid = false;
      }
      
      // Mobile validation (simple check for digits and length)
      const mobileRegex = /^\d{10,15}$/;
      if (!mobileRegex.test(mobileInput.value.replace(/\D/g, ''))) {
        mobileInput.classList.add('error');
        mobileInput.nextElementSibling.style.display = 'block';
        isValid = false;
      }
      
      // Password validation
      if (passwordInput.value.length < 8) {
        passwordInput.classList.add('error');
        passwordInput.nextElementSibling.style.display = 'block';
        isValid = false;
      }
      
      // Confirm password validation
      if (confirmPasswordInput.value !== passwordInput.value) {
        confirmPasswordInput.classList.add('error');
        confirmPasswordInput.nextElementSibling.style.display = 'block';
        isValid = false;
      }
      
      // Terms validation
      if (!termsCheckbox.checked) {
        showNotification('error', 'Terms Required', 'Please agree to the Terms and Conditions to continue.');
        isValid = false;
      }
      
      if (isValid) {
        // Show loading state
        signupBtn.classList.add('loading');
        signupBtn.disabled = true;
        
        // Simulate API call
        setTimeout(() => {
          // Reset button state
          signupBtn.classList.remove('loading');
          signupBtn.disabled = false;
          
          // Show success notification
          showNotification('success', 'Account Created', 'Your account has been created successfully!');
          
          // Reset form
          signupForm.reset();
          
          // In a real app, you would redirect to the dashboard or login page
          // window.location.href = 'dashboard.html';
        }, 2000);
      } else {
        // Show error notification
        showNotification('error', 'Sign Up Failed', 'Please correct the errors and try again.');
      }
    });
    
    // Social login buttons
    document.querySelectorAll('.social-btn').forEach(button => {
      button.addEventListener('click', function() {
        const platform = this.textContent.trim();
        showNotification('success', `${platform} Sign Up`, `Redirecting to ${platform} authentication...`);
        
        // In a real app, you would redirect to the OAuth provider
        // window.location.href = `/auth/${platform.toLowerCase()}`;
      });
    });
  </script>
</body>
</html>
