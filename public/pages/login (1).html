<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Code4Earth</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #0d5c63;
      --primary-dark: #09474d;
      --primary-light: #12878f;
      --secondary: #0a4e29;
      --accent: #27ae60;
      --light: #f8f9fa;
      --dark: #343a40;
      --gray: #6c757d;
      --light-gray: #e9ecef;
      --border-radius: 10px;
      --transition: all 0.3s ease;
    }

    .login {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #cfdbed, #e6f3ec);
      font-family: 'Poppins', sans-serif;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Background decoration */
    .login::before {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(13, 92, 99, 0.1) 0%, rgba(13, 92, 99, 0) 70%);
      top: -100px;
      right: -100px;
      z-index: 0;
    }

    .login::after {
      content: "";
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(10, 78, 41, 0.1) 0%, rgba(10, 78, 41, 0) 70%);
      bottom: -50px;
      left: -50px;
      z-index: 0;
    }

    .login-container {
      background: #5dd161;
      padding: 30px 25px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 350px;
      text-align: center;
      animation: fadeIn 1s ease;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
      z-index: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      gap: 10px;
    }

    .logo-icon {
      width: 28px;
      height: 38px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
    }

    .brand {
      font-size: 16px;
      font-weight: 700;
      color: var(--secondary);
      letter-spacing: -0.5px;
    }

    .login-container h2 {
      margin-bottom: 20px;
      color: var(--secondary);
      font-size: 22px;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 16px;
      text-align: left;
      position: relative;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 500;
      color: var(--dark);
      display: block;
      margin-bottom: 6px;
    }

    .input-wrapper {
      position: relative;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ccc;
      border-radius: var(--border-radius);
      outline: none;
      font-size: 13px;
      transition: var(--transition);
      font-family: 'Poppins', sans-serif;
      background-color: var(--light);
    }

    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(13, 92, 99, 0.2);
      background-color: white;
    }

    .form-group input.error {
      border-color: #e74c3c;
    }

    .error-message {
      color: #e74c3c;
      font-size: 11px;
      margin-top: 4px;
      display: none;
    }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      cursor: pointer;
      transition: var(--transition);
      font-size: 14px;
    }

    .toggle-password:hover {
      color: var(--primary);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      font-size: 12px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--dark);
    }

    .remember-me input {
      width: auto;
      margin: 0;
    }

    .forgot-password {
      color: var(--primary);
      font-weight: 500;
      text-decoration: none;
      transition: var(--transition);
    }

    .forgot-password:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff;
      border: none;
      border-radius: var(--border-radius);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(13, 92, 99, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .btn .spinner {
      display: none;
      margin-left: 8px;
    }

    .btn.loading .spinner {
      display: inline-block;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      color: var(--gray);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--light-gray);
    }

    .divider span {
      padding: 0 12px;
    }

    .social-login {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .social-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--light-gray);
      border-radius: var(--border-radius);
      background: white;
      color: var(--dark);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .social-btn:hover {
      background: var(--light);
      border-color: var(--primary);
      transform: translateY(-2px);
    }

    .social-btn i {
      font-size: 16px;
    }

    .google { color: #355fea; }
    .github { color: #333; }
    .twitter { color: #1da1f2; }

    .extra {
      margin-top: 16px;
      font-size: 11px;
      color: var(--dark);
    }

    .extra a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
      transition: var(--transition);
    }

    .extra a:hover {
      color: var(--primary-light);
      text-decoration: underline;
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 14px 20px;
      border-radius: var(--border-radius);
      background: white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
      transform: translateX(120%);
      transition: transform 0.3s ease;
      z-index: 1000;
    }

    .notification.show {
      transform: translateX(0);
    }

    .notification.success {
      border-left: 4px solid var(--accent);
    }

    .notification.error {
      border-left: 4px solid #e74c3c;
    }

    .notification i {
      font-size: 18px;
    }

    .notification.success i {
      color: var(--accent);
    }

    .notification.error i {
      color: #e74c3c;
    }

    .notification-content {
      flex: 1;
    }

    .notification-title {
      font-weight: 600;
      margin-bottom: 3px;
      font-size: 14px;
    }

    .notification-message {
      font-size: 12px;
      color: var(--gray);
    }

    .notification-close {
      cursor: pointer;
      color: var(--gray);
      transition: var(--transition);
      font-size: 14px;
    }

    .notification-close:hover {
      color: var(--dark);
    }

    footer {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      color: var(--gray);
      z-index: 1;
    }

    footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .login-container { 
        padding: 25px 20px; 
        max-width: 100%;
      }
      
      .logo {
        margin-bottom: 18px;
      }
      
      .login-container h2 { font-size: 20px; }
      
      .btn { 
        font-size: 13px; 
        padding: 11px;
      }
      
      .social-login {
        flex-direction: column;
        gap: 8px;
      }
      
      .notification {
        right: 10px;
        left: 10px;
      }
    }
  </style>
</head>
<body class="login">
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">
        <i class="fas fa-code-branch"></i>
      </div>
      <div class="brand">Code4Earth</div>
    </div>
    
    <h2>Log in to your account</h2>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <input type="email" id="email" placeholder="Enter your email" required>
          <span class="error-message">Please enter a valid email address</span>
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Enter your password" required>
          <i class="fas fa-eye toggle-password" id="togglePassword"></i>
          <span class="error-message">Password must be at least 8 characters</span>
        </div>
      </div>
      
      <div class="form-options">
        <div class="remember-me">
          <input type="checkbox" id="remember">
          <label for="remember">Remember me</label>
        </div>
        <a href="#" class="forgot-password">Forgot password?</a>
      </div>
      
      <button type="submit" class="btn" id="loginBtn">
        Login
        <i class="fas fa-spinner spinner"></i>
      </button>
    </form>
    
    <div class="divider">
      <span>or continue with</span>
    </div>
    
    <div class="social-login">
      <button class="social-btn google">
        <i class="fab fa-google"></i> Google
      </button>
      <button class="social-btn github">
        <i class="fab fa-github"></i> GitHub
      </button>
      <button class="social-btn twitter">
        <i class="fab fa-twitter"></i> Twitter
      </button>
    </div>
    
    <div class="extra">
      Don’t have an account? <a href="signup.html">Sign Up here</a>
    </div>
  </div>
  
  <!-- Notification -->
  <div class="notification" id="notification">
    <i class="fas fa-check-circle"></i>
    <div class="notification-content">
      <div class="notification-title">Success</div>
      <div class="notification-message">You have successfully logged in!</div>
    </div>
    <i class="fas fa-times notification-close" id="notificationClose"></i>
  </div>
  
  <script>
    // Toggle password visibility
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    togglePassword.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      
      // Toggle eye icon
      this.classList.toggle('fa-eye');
      this.classList.toggle('fa-eye-slash');
    });
    
    // Form validation and submission
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const loginBtn = document.getElementById('loginBtn');
    const notification = document.getElementById('notification');
    const notificationClose = document.getElementById('notificationClose');
    
    // Show notification function
    function showNotification(type, title, message) {
      const notificationEl = document.getElementById('notification');
      const icon = notificationEl.querySelector('i');
      const titleEl = notificationEl.querySelector('.notification-title');
      const messageEl = notificationEl.querySelector('.notification-message');
      
      // Set notification type
      notificationEl.className = 'notification ' + type;
      
      // Set icon based on type
      if (type === 'success') {
        icon.className = 'fas fa-check-circle';
      } else if (type === 'error') {
        icon.className = 'fas fa-exclamation-circle';
      }
      
      // Set content
      titleEl.textContent = title;
      messageEl.textContent = message;
      
      // Show notification
      notificationEl.classList.add('show');
      
      // Auto hide after 5 seconds
      setTimeout(() => {
        notificationEl.classList.remove('show');
      }, 5000);
    }
    
    // Close notification
    notificationClose.addEventListener('click', function() {
      notification.classList.remove('show');
    });
    
    // Form submission
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Reset previous errors
      document.querySelectorAll('.error-message').forEach(el => {
        el.style.display = 'none';
      });
      emailInput.classList.remove('error');
      passwordInput.classList.remove('error');
      
      // Basic validation
      let isValid = true;
      
      // Email validation
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(emailInput.value)) {
        emailInput.classList.add('error');
        emailInput.nextElementSibling.style.display = 'block';
        isValid = false;
      }
      
      // Password validation
      if (passwordInput.value.length < 8) {
        passwordInput.classList.add('error');
        passwordInput.nextElementSibling.style.display = 'block';
        isValid = false;
      }
      
      if (isValid) {
        // Show loading state
        loginBtn.classList.add('loading');
        loginBtn.disabled = true;
        
        // Simulate API call
        setTimeout(() => {
          // Reset button state
          loginBtn.classList.remove('loading');
          loginBtn.disabled = false;
          
          // Show success notification
          showNotification('success', 'Login Successful', 'You have been logged in successfully!');
          
          // In a real app, you would redirect to the dashboard
          // window.location.href = 'dashboard.html';
        }, 2000);
      } else {
        // Show error notification
        showNotification('error', 'Login Failed', 'Please correct the errors and try again.');
      }
    });
    
    // Social login buttons
    document.querySelectorAll('.social-btn').forEach(button => {
      button.addEventListener('click', function() {
        const platform = this.textContent.trim();
        showNotification('success', `${platform} Login`, `Redirecting to ${platform} authentication...`);
        
        // In a real app, you would redirect to the OAuth provider
        // window.location.href = `/auth/${platform.toLowerCase()}`;
      });
    });
    
    // Forgot password link
    document.querySelector('.forgot-password').addEventListener('click', function(e) {
      e.preventDefault();
      showNotification('success', 'Password Reset', 'Password reset instructions have been sent to your email.');
    });
  </script>
</body>
</html>
